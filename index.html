*{box-sizing:border-box;margin:0;padding:0}
body{

b,strong,h1,h2,h3,th,button{font-weight:700}
.sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.sky span{position:absolute;font-size:22px;opacity:.85;filter:drop-shadow(1px 2px 0 rgba(120,40,100,.25));animation:tw 3s ease-in-out infinite}
@keyframes tw{0%,100%{transform:scale(1)}50%{transform:scale(1.25) rotate(8deg)}}
header,nav,main,footer{position:relative;z-index:1}
header{padding:22px 16px 0;max-width:1080px;margin:0 auto}
.papercard{background:var(--paper);border:3px solid var(--pink-deep);border-radius:12px;box-shadow:6px 6px 0 var(--shadow);padding:12px 16px 14px;position:relative}
.papercard:before{content:"";position:absolute;top:-3px;left:-3px;right:-3px;height:30px;background:var(--pink);border-radius:9px 9px 0 0;border:3px solid var(--pink-deep)}
.papercard h1{position:relative;font-size:17px;color:#fff;text-shadow:1.5px 1.5px 0 var(--pink-dark);letter-spacing:.04em;margin-bottom:16px}
.wk{font-size:16px;color:var(--ink);font-weight:700}
.asof{color:var(--ink-2);font-size:13px}
.affirm{margin-top:10px;background:#fff;border:3px dashed var(--pink);border-radius:10px;padding:9px 12px;font-size:15px;color:var(--pink-dark);font-weight:600;display:flex;gap:10px;align-items:center}
.affirm .re{margin-left:auto;cursor:pointer;border:0;background:none;font-size:16px;flex:0 0 auto}
.headrow{display:grid;grid-template-columns:1fr auto auto;gap:12px;margin-top:12px;align-items:stretch}

.banner{background:var(--cream);border:3px solid var(--pink-deep);border-radius:10px;box-shadow:5px 5px 0 var(--shadow);padding:8px 12px;font-size:14.5px;color:var(--ink);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.count-chip{background:var(--pink-2);border:2px solid var(--pink-dark);color:#fff;border-radius:999px;padding:2px 12px;font-size:12px;font-weight:700;box-shadow:2px 2px 0 var(--shadow);white-space:nowrap}
/* pomodoro */
.pomo{background:var(--cream);border:3px solid var(--pink-deep);border-radius:10px;box-shadow:5px 5px 0 var(--shadow);padding:8px 14px;display:flex;align-items:center;gap:10px;min-width:250px}
.pomo .time{font-size:26px;font-weight:700;color:var(--pink-dark);font-variant-numeric:tabular-nums;letter-spacing:.03em}
.pomo .mode{font-size:12px;color:var(--ink-2);line-height:1.3}
.pomo button{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--pink-dark);background:var(--pink-2);color:#fff;font-size:14px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow)}
.pomo button.ghost{background:#fff;color:var(--pink-dark)}
.pomo button:active{transform:translate(1px,1px);box-shadow:0 0 0}
nav{position:sticky;top:0;z-index:5;max-width:1080px;margin:16px auto 0;padding:8px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg,rgba(231,159,216,.94),rgba(231,159,216,.78));backdrop-filter:blur(3px)}
nav button{flex:0 0 auto;font-family:var(--body);font-weight:700;font-size:14.5px;color:var(--ink);background:var(--cream);border:3px solid var(--pink-deep);border-radius:999px;padding:6px 14px;cursor:pointer;box-shadow:3px 3px 0 var(--shadow);white-space:nowrap}
nav button.on{background:var(--pink-2);color:#fff;text-shadow:1px 1px 0 var(--pink-dark)}
nav button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
main{max-width:1080px;margin:0 auto;padding:16px 16px 30px}
section{display:none}section.on{display:block}
.card{background:var(--cream);border:3px solid var(--pink-deep);border-radius:12px;box-shadow:6px 6px 0 var(--shadow);padding:14px 16px;margin-bottom:16px}
.card h2{font-size:15px;color:var(--pink-dark);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card h2 .tag{font-size:12px;font-weight:600;color:var(--ink-2);border:2px dashed var(--pink);border-radius:999px;padding:0 10px}
.hint{color:var(--ink-2);font-size:13px;margin:4px 0 10px}
ul.plain{list-style:none}
ul.plain li{padding:7px 0;border-bottom:2px dotted var(--line);display:flex;gap:10px;align-items:flex-start}
ul.plain li:last-child{border-bottom:0}
.pri{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-radius:6px;padding:2px 8px;white-space:nowrap;border:2px solid rgba(120,40,90,.3);box-shadow:2px 2px 0 var(--shadow)}
.pri.urgent{background:var(--critical);color:#fff}.pri.high{background:var(--serious);color:#fff}
.pri.normal{background:#fbd9ec;color:var(--ink)}.pri.low{background:#eee3d3;color:var(--ink-2)}
.overdue{color:#d13c6c;font-size:13px;font-weight:700;white-space:nowrap}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;border:2px solid var(--pink);background:#fff;border-radius:999px;padding:1px 9px;color:var(--ink);white-space:nowrap}
.dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto;box-shadow:1px 1px 0 var(--shadow)}
.st{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:6px;padding:2px 8px;white-space:nowrap;border:2px solid rgba(120,40,90,.3);box-shadow:2px 2px 0 var(--shadow);color:#fff}
.st.pub{background:var(--good)}.st.sch{background:var(--sch)}.st.appr{background:var(--appr)}
.st.pend{background:#e8d9c4;color:var(--ink)}.st.subm{background:var(--warn);color:#6d5300}
.st.road{background:var(--critical)}.st.notpub{background:var(--serious)}
.st.none{background:none;border:2px dashed var(--muted);color:var(--muted);box-shadow:none}
.weekgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:12px}

.daycol h3{font-size:14px;color:var(--pink-dark);margin-bottom:8px;display:flex;justify-content:space-between;gap:6px}
.daycol h3 .dnum{color:var(--muted);font-weight:600}
.daycol.today h3:after{content:"♡ today";font-size:11px;color:var(--lav)}
.slot{border-top:2px dotted var(--line);padding:7px 0;font-size:13.5px}
.slot:first-of-type{border-top:0}
.slot .top{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:3px}
.slot .n{color:var(--ink)}
.tmeta{color:var(--muted);font-size:12px;font-weight:600}
.empty{color:var(--muted);font-style:italic;font-size:13px;padding:8px 0}
.gap{background:#fff;border:2px solid var(--warn);border-left-width:8px;border-radius:8px;padding:7px 12px;margin:7px 0;font-size:14px;color:var(--ink);box-shadow:3px 3px 0 var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;color:var(--pink-dark);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:3px solid var(--pink)}
td{padding:7px 8px;border-bottom:2px dotted var(--line);vertical-align:top}

.rep{font-size:15px}

.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
.btnrow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:2px dotted var(--line);cursor:pointer}
.task:last-child{border-bottom:0}
.task input{appearance:none;width:22px;height:22px;border:3px solid var(--pink-deep);border-radius:6px;background:#fff;flex:0 0 auto;margin-top:1px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);display:grid;place-items:center}
.task input:checked{background:var(--pink-2)}
.task input:checked:after{content:"♥";color:#fff;font-size:13px;line-height:1}
.task.done .tn{text-decoration:line-through;color:var(--muted)}
.tn{flex:1}
.chip.ghost{border-style:dashed;opacity:.6;background:none}

details.card>*:nth-child(2){margin-top:10px}

</style>

function syncBlocks(){

  [...done.keys()].filter(id=>(id.startsWith("rd-")||id.startsWith("plan-"))&&!create.has(id)).forEach(id=>{
    const src = id.startsWith("rd-")? DATA.readai[+id.slice(3)] : DATA.weekPlan[+id.slice(5)];
    create.set(id, {name: src.task||src.name, pri: src.pri||"high", src: src.src});
  });

  const compl=[...done.keys()].filter(k=>!isVirtual(k));
  if(compl.length){ msg += "\nMark these existing tasks complete:\n";

(function(){
  const WORK=25*60, BREAK=5*60;
  let left=WORK, mode="focus", runs=0, timer=null;
  const t=document.getElementById("pomoTime"), m=document.getElementById("pomoMode"), go=document.getElementById("pomoGo");
  const paint=()=>{ t.textContent=`${String(Math.floor(left/60)).padStart(2,"0")}:${String(left%60).padStart(2,"0")}`;
    m.textContent=(mode==="focus"?"focus time":"break time ☁️")+` · ${runs} done`;
    document.title = timer? `${t.textContent} ${mode==="focus"?"🍅":"☁️"} my silly week` : "salt.xo — my silly week ♡"; };
  const beep=()=>{ try{ const ac=new (window.AudioContext||window.webkitAudioContext)();
    [0,.2,.4].forEach((d,i)=>{ const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination);
      o.frequency.value=[880,1100,1320][i]; g.gain.setValueAtTime(.12,ac.currentTime+d); g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d+.18);
      o.start(ac.currentTime+d); o.stop(ac.currentTime+d+.2); }); }catch(e){} };
  const tick=()=>{ left--; if(left<=0){ beep();
      if(mode==="focus"){ runs++; mode="break"; left=BREAK; confettiBurst(go); throwTomatoes(9); showToast("pomodoro done!! 🍅 splat!! break time 💗"); }
      else { mode="focus"; left=WORK; showToast("break's over — soft life, hard focus ✧"); } }
    paint(); };
  document.getElementById("pomoTom").onclick=()=>throwTomatoes(6);
  go.onclick=()=>{ if(timer){ clearInterval(timer); timer=null; go.textContent="▶"; }
    else { timer=setInterval(tick,1000); go.textContent="⏸"; } paint(); };
  document.getElementById("pomoReset").onclick=()=>{ clearInterval(timer); timer=null; go.textContent="▶"; mode="focus"; left=WORK; paint(); };
  paint();
})();

function copyText(t, okMsg){
  (navigator.clipboard? navigator.clipboard.writeText(t): Promise.reject())
    .then(()=>showToast(okMsg))
    .catch(()=>{ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select();
      try{document.execCommand("copy"); showToast(okMsg);}catch(e){showToast("copy failed");} ta.remove(); });
}
let toastT;
function showToast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---------- confetti — hearts + sparkles ---------- */
const cv=document.getElementById("confetti"), cx=cv.getContext("2d");
let parts=[], raf=null;
function sizeCv(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;cx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
addEventListener("resize",sizeCv); sizeCv();
const CCOLORS=["#f48fc0","#ee6faf","#c791e6","#f2cd5e","#8fbef5","#fff6dd"];
const CGLYPHS=["♥","♥","✦","★","♡"];
function confettiBurst(anchor){
  const r=anchor.getBoundingClientRect(), ox=r.left+r.width/2, oy=r.top+r.height/2;
  for(let i=0;i<90;i++){
    const a=Math.PI*(1.05+Math.random()*0.9), sp=6+Math.random()*8;
    parts.push({x:ox,y:oy,vx:Math.cos(a)*sp*(Math.random()<.5?1:-1),vy:Math.sin(a)*sp-4,
      g:.32,w:6+Math.random()*5,rot:Math.random()*6.28,vr:(Math.random()-.5)*.4,
      c:CCOLORS[i%CCOLORS.length],glyph:(i%3===0)?CGLYPHS[i%CGLYPHS.length]:null,life:70+Math.random()*40});
  }
  if(!raf) loop();
}
function loop(){
  raf=requestAnimationFrame(loop);
  cx.clearRect(0,0,innerWidth,innerHeight);
  parts=parts.filter(p=>p.life>0);
  if(!parts.length){cancelAnimationFrame(raf);raf=null;return;}
  parts.forEach(p=>{p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.985;p.rot+=p.vr;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.globalAlpha=Math.min(1,p.life/30);
    if(p.glyph){cx.font=(p.w+8)+"px serif";cx.fillStyle=p.c;cx.textAlign="center";cx.textBaseline="middle";cx.fillText(p.glyph,0,0);}
    else{cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.w/2,p.w,p.w);}
    cx.restore();});
}

/* ---------- tomato splat 🍅 ---------- */
const sv=document.getElementById("splat"), sx2=sv.getContext("2d");
function sizeSv(){sv.width=innerWidth*devicePixelRatio;sv.height=innerHeight*devicePixelRatio;sx2.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
addEventListener("resize",sizeSv); sizeSv();
let toms=[], splats=[], sraf=null;
function splatSound(){ try{ const ac=new (window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();o.type="triangle";
  o.frequency.setValueAtTime(170,ac.currentTime);o.frequency.exponentialRampToValueAtTime(45,ac.currentTime+.18);
  g.gain.setValueAtTime(.22,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.25);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.3);}catch(e){} }
function throwTomatoes(n){
  for(let i=0;i<n;i++){
    const fromSide=Math.random()<.5;
    const sxp = fromSide? (Math.random()<.5?-50:innerWidth+50) : Math.random()*innerWidth;
    const syp = fromSide? Math.random()*innerHeight : (Math.random()<.5?-50:innerHeight+50);
    toms.push({sx:sxp,sy:syp,tx:innerWidth*(0.1+Math.random()*0.8),ty:innerHeight*(0.12+Math.random()*0.7),
      t:-i*7, dur:24+Math.random()*14, rot:Math.random()*6.28, vr:(Math.random()-.5)*.6});
  }
  if(!sraf) sloop();
}
function mkSplat(x,y){ splatSound();
  const blobs=Array.from({length:8},()=>({dx:(Math.random()-.5)*52,dy:(Math.random()-.5)*38,r:6+Math.random()*16}));
  const drips=Array.from({length:4+Math.floor(Math.random()*3)},()=>({dx:(Math.random()-.5)*44,len:0,max:24+Math.random()*52,w:3+Math.random()*4,sp:.5+Math.random()*1.3}));
  splats.push({x,y,blobs,drips,life:170});
}
function sloop(){
  sraf=requestAnimationFrame(sloop);
  sx2.clearRect(0,0,innerWidth,innerHeight);
  toms=toms.filter(o=>o.t<o.dur); splats=splats.filter(s=>s.life>0);
  if(!toms.length&&!splats.length){cancelAnimationFrame(sraf);sraf=null;sx2.clearRect(0,0,innerWidth,innerHeight);return;}
  toms.forEach(o=>{o.t++; if(o.t<0)return;
    const p=Math.min(1,o.t/o.dur);
    const x=o.sx+(o.tx-o.sx)*p, y=o.sy+(o.ty-o.sy)*p;
    o.rot+=o.vr;
    sx2.save();sx2.translate(x,y);sx2.rotate(o.rot);
    sx2.font=(16+p*p*48)+"px serif";sx2.textAlign="center";sx2.textBaseline="middle";sx2.fillText("🍅",0,0);sx2.restore();
    if(o.t>=o.dur-1) mkSplat(o.tx,o.ty);
  });
  splats.forEach(s=>{s.life--;
    const a=Math.min(1,s.life/60);
    sx2.globalAlpha=a; sx2.fillStyle="#e0403f";
    s.blobs.forEach(b=>{sx2.beginPath();sx2.ellipse(s.x+b.dx,s.y+b.dy,b.r,b.r*.8,0,0,6.29);sx2.fill();});
    s.drips.forEach(d=>{ if(d.len<d.max)d.len+=d.sp;
      sx2.fillRect(s.x+d.dx-d.w/2, s.y, d.w, d.len);
      sx2.beginPath();sx2.arc(s.x+d.dx,s.y+d.len,d.w*.7,0,6.29);sx2.fill();});
    sx2.fillStyle="#ffd98a"; sx2.globalAlpha=a*.6;
    s.blobs.slice(0,4).forEach(b=>{sx2.beginPath();sx2.arc(s.x+b.dx*.5,s.y+b.dy*.5,2,0,6.29);sx2.fill();});
    sx2.globalAlpha=1;
  });
}
